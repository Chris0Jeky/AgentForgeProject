name: AgentForge Commands (self-hosted)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  wake-and-poll:
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: [self-hosted, agentforge]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - run: |
          python3 -m pip install -e .
          agentforge daemon --once
