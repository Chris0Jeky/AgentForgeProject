name: AgentForge Commands (webhook mode)

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  handle:
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: [self-hosted, agentforge]
    steps:
      - uses: actions/checkout@v4
      - name: Install AgentForge
        run: |
          python3 -m pip install -e .
      - name: Handle event payload
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: |
          agentforge webhook --event-file "$GITHUB_EVENT_PATH"
