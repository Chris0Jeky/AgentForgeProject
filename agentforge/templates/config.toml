# AgentForge repo config (commit this file)

# Optional: enable GitHub automation by setting owner/repo.
# Example: repo = "Chris0Jeky/Taskdeck"
repo = ""

# Git defaults
default_remote = "origin"
default_base_branch = "main"
default_base_ref = "origin/main"

worktrees_dir = ".worktrees"

# State/log/cache dirs (recommend leaving defaults)
state_dir = ".agentforge/state"
logs_dir = ".agentforge/logs"
cache_dir = ".agentforge/cache"

# Port pool for per-agent stacks (optional)
port_start = 8081
port_end   = 8180

# Optional Docker Compose integration for your project:
# compose_file = "deploy/docker-compose.yml"
# compose_profile = "baseline"
compose_file = ""
compose_profile = ""
compose_project_prefix = "af"

# Harness commands (project-specific)
# Use shell (bash/sh/pwsh) to run; keep commands idempotent.
harness_setup = [
  # "npm ci",
]
harness_check = [
  # "npm test",
]

# Default provider adapter
default_provider = "codex_cli"

# Default workflow name (from .agentforge/workflows.toml)
default_workflow = "default"

# Auto-lock / auto-workflow routing strategy when pulling from the GitHub queue.
# Options: none | labels | keywords | labels_then_keywords
auto_lock_strategy = "labels_then_keywords"

# Sticky lock maintenance (optional)
# If you use sticky=true in a workflow lock step, AgentForge can renew that lock
# and auto-release it when the PR is merged/closed.
lock_renew_interval_sec = 120
sticky_lock_default_ttl_sec = 21600
sticky_lock_auto_release = true

# PR comment poll interval (seconds)
poll_interval_sec = 45

# GitHub issue queue defaults
queue_label = "agent:queued"
in_progress_label = "agent:in-progress"
done_label = "agent:done"
