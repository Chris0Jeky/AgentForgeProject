# AgentForge policy (commit this file)
#
# Goals:
# - smooth by default ("fast")
# - hard stop on high-risk diffs (scanner)
# - only accept PR comment commands from allowlisted users

mode = "fast"  # fast | safe

# Who can control the daemon via PR comments:
allowed_comment_authors = [
  # "your-github-username"
]

# Safer default for automation:
deny_forks = true

# Paths automation must never modify:
forbid_globs = [
  # ".agentforge/**",
]

# Paths that are sensitive. You choose how to treat them with protect_behavior.
protect_globs = [
  ".github/workflows/**",
]

# What to do if a protected path changes:
#   - "warn": allow but emit warnings (smoother)
#   - "halt": stop automation (safer)
protect_behavior = "warn"

# Automation risk threshold heuristics:
max_changed_lines = 4000

# Automation behavior:
require_harness_check = true
allow_auto_commit = true
allow_auto_push = true
