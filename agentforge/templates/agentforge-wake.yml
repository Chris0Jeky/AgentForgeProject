name: AgentForge Wake

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  wake:
    if: ${{ github.event.issue.pull_request != null }}
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "Wake event received."
          echo "Recommended: run a local agentforge daemon, or wire a self-hosted runner to run:"
          echo "  agentforge webhook --event-file $GITHUB_EVENT_PATH"
